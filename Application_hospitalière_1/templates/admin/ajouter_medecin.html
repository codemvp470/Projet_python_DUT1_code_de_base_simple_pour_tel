<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Ajouter un médecin</title>
</head>

<body>

    <h1>👨‍⚕️ Ajouter un médecin</h1>

        <form method="POST" action="{{ url_for('ajouter_medecin') }}">

    <label>Nom complet :</label><br>
    <input type="text" name="nom_complet" required><br><br>

    <label>Email :</label><br>
    <input type="email" name="email" required><br><br>

    <label>Spécialité :</label><br>
    <input type="text" name="specialite" required><br><br>

    <label>Téléphone :</label><br>
    <input type="tel" name="telephone" value="+241" required>

    <button type="submit">Enregistrer</button>

</form>

    <br>

    <a href="{{ url_for('liste_medecins') }}">
        📋 Voir la liste des médecins
    </a>

</body>
</html>
