<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Prise de Rendez-vous</title>
</head>
<body>

    <h1>🏥 Prendre un Rendez-vous</h1>
    <hr>

    <form method="POST">

        <label>Nom :</label><br>
        <input type="text" name="nom" required><br><br>

        <label>Prénom :</label><br>
        <input type="text" name="prenom" required><br><br>

        <label>Age :</label><br>
        <input type="number" name="age" required><br><br>

        <label>Groupe sanguin :</label><br>
        <select name="groupe_sanguin" required>
            <option value="">-- Choisir --</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
            <option value="Aucune idée">Aucune idée</option>
        </select><br><br>

        <label>Fonction :</label><br>
        <input type="text" name="fonction" required><br><br>

        <label>Choisir un médecin :</label><br>
        <select name="medecin_id" required>
            <option value="">-- Sélectionner un médecin --</option>
            {% for medecin in medecins %}

            <option value="{{ medecin.id }}">
                {{ medecin.nom }} — {{ medecin.specialite }}
            </option>
            {% endfor %}
        </select><br><br>

        <label>Date :</label><br>
        <input type="date" name="date" required><br><br>

        <label>Heure :</label><br>
        <input type="time" name="heure" required><br><br>

        <label>Motif :</label><br>
        <textarea name="motif" rows="4" cols="40" required></textarea><br><br>

        <button type="submit">✅ Confirmer le rendez-vous</button>

    </form>

    <br>
    <a href="/patient/dashboard">⬅️ Retour au dashboard</a>

</body>
</html>
